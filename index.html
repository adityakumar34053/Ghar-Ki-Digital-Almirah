<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Almirah - Secure Pro</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="app-container">
        <h2>Security Lock 🔒</h2>
        <p>Apni Digital Almirah kholne ke liye password daalein</p>
        
        <input type="password" id="passInput" placeholder="Password yahan likhein..." style="width: 90%; padding: 12px; margin-bottom: 15px; border: 2px solid #ccc; border-radius: 8px;">
        
        <button onclick="checkPassword()">Unlock Karein</button>
        <p id="loginError" style="color: #ff4b2b; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        
        <h2>Digital Almirah 🗄️</h2>
        <p>Ghar ka koi bhi zaroori samaan dhoondhein</p>
        
        <input type="text" id="searchBox" placeholder="Samaan dhoondhein (jaise: Marksheet)...">
        <button onclick="khojo()">Dhoondho</button>

        <div id="resultArea">Aapka result yahan dikhega...</div>


        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ccc;">
        
        <h3 style="color: #2c3e50; margin-bottom: 15px;">Naya Samaan Rakhein ➕</h3>
        
        <input type="text" id="nayaNaam" placeholder="Samaan ka naam (jaise: 10th Docs)...">
        <input type="text" id="nayiJagah" placeholder="Kahan rakha hai? (jaise: Locker 1)...">
        
        <p style="text-align: left; font-size: 14px; margin-bottom: 5px; color: #555;">Documents ya Photos chunein:</p>
        <input type="file" id="samaanFile" accept="image/*,.pdf" multiple>
        <p style="font-size: 12px; color: #28a745; margin-top: 0; margin-bottom: 15px; text-align: left;">(Aap ek sath kai files select kar sakte hain)</p>
        
        <button onclick="samaanJodo()">Save Karo</button>
        
        <div id="saveMessage" style="margin-top: 10px; font-weight: bold;"></div>

        <button onclick="logout()" style="background: linear-gradient(135deg, #7f8c8d, #34495e); margin-top: 25px; font-size: 13px; padding: 10px; width: auto; min-width: 120px;">
            Logout 🚪
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
